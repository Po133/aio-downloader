name: youtube-downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: >
          Enter one or more YouTube URLs. Each can be followed by optional "v"/"a" and a
          quality value (e.g. "v 480" or "a 192"). Separate entries with newlines, commas,
          or spaces.
        required: true
        type: string
      output_format:
        description: 'Output format (applied when no per‑URL "v"/"a" is given)'
        required: false
        type: choice
        options:
          - 'mp4 (video)'
          - 'mp3 (audio only)'
        default: 'mp4 (video)'
      video_quality:
        description: 'Max video resolution (720p if nothing is specified)'
        required: false
        type: choice
        options:
          - '2160 (4K)'
          - '1080 (Full HD)'
          - '720 (HD)'
          - '480'
          - '360'
          - 'best'
        default: '720 (HD)'
      audio_quality:
        description: 'Audio bitrate for MP3 downloads'
        required: false
        type: choice
        options:
          - '320'
          - '192'
          - '128'
          - '64'
        default: '320'
      bundle_all:
        description: 'Bundle all downloaded files into a single ZIP archive before splitting'
        type: boolean
        default: false
      upload_as_release:
        description: 'Upload files as a GitHub Release (uncheck = split push to repo)'
        type: boolean
        default: false
      include_metadata:
        description: 'Save video metadata (title, description, tags, channel) to JSON file'
        type: boolean
        default: true
      include_thumbnail:
        description: 'Download video thumbnail image'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 700
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: '📁 Create temp working directory'
        id: tempdir
        run: |
          TEMP_DIR=$(mktemp -d -t yt-dlp-XXXXXX)
          echo "TEMP_DIR=$TEMP_DIR" >> $GITHUB_OUTPUT

      - name: '🔐 Prepare cookies'
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > youtube-cookies.txt
          fi
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: '📝 Parse URLs'
        id: parse
        run: |
          INPUT="${{ github.event.inputs.url }}"
          MODIFIED=$(echo "$INPUT" | tr ',' '\n')
          ENTRIES='[]'
          while IFS= read -r line; do
            line=$(echo "$line" | xargs)
            [ -z "$line" ] && continue
            tokens=($line)
            i=0
            while [ $i -lt ${#tokens[@]} ]; do
              token="${tokens[$i]}"
              if [[ "$token" =~ ^https?:// ]]; then
                link="$token"
                args=()
                i=$((i+1))
                while [ $i -lt ${#tokens[@]} ]; do
                  next="${tokens[$i]}"
                  [[ "$next" =~ ^https?:// ]] && break
                  args+=("$next")
                  i=$((i+1))
                done
                args_json=$(printf '%s\n' "${args[@]}" | jq -R . | jq -s .)
                entry=$(jq -n --arg link "$link" --argjson args "$args_json" '{link: $link, args: $args}')
                ENTRIES=$(echo "$ENTRIES" | jq ". + [$entry]")
              else
                i=$((i+1))
              fi
            done
          done <<< "$MODIFIED"
          ENTRIES_JSON=$(echo "$ENTRIES" | jq -c .)
          echo "ENTRIES_JSON=$ENTRIES_JSON" >> $GITHUB_OUTPUT
          IS_ANY_YT=$(echo "$ENTRIES" | jq '[.[].link | test("youtube\\.com/watch\\?v=|youtu\\.be/")] | any')
          echo "IS_ANY_YT=$IS_ANY_YT" >> $GITHUB_OUTPUT

      - name: '🛠️ Install tools'
        if: steps.parse.outputs.IS_ANY_YT == 'true'
        run: |
          mkdir -p ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/.local/bin/yt-dlp
          chmod a+rx ~/.local/bin/yt-dlp
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq ffmpeg
          curl -fsSL https://deno.land/install.sh | sh -s -- -y
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: '⬇️ Download videos with metadata and thumbnails'
        id: primary_download
        run: |
          set -e
          ENTRIES_JSON='${{ steps.parse.outputs.ENTRIES_JSON }}'
          OUTPUT_FOLDER="${{ steps.tempdir.outputs.TEMP_DIR }}"
          mkdir -p "$OUTPUT_FOLDER"

          GLOBAL_FORMAT="${{ github.event.inputs.output_format }}"
          GLOBAL_VQ="${{ github.event.inputs.video_quality }}"
          GLOBAL_AQ="${{ github.event.inputs.audio_quality }}"
          INCLUDE_METADATA="${{ github.event.inputs.include_metadata }}"
          INCLUDE_THUMBNAIL="${{ github.event.inputs.include_thumbnail }}"

          GLOBAL_VQ_NUM=$(echo "$GLOBAL_VQ" | grep -o '[0-9]*' | head -1)
          GLOBAL_AQ_NUM=$(echo "$GLOBAL_AQ" | grep -o '[0-9]*' | head -1)
          [ "$GLOBAL_VQ" = "best" ] && GLOBAL_VQ_NUM="max"
          [ "$GLOBAL_AQ" = "best" ] && GLOBAL_AQ_NUM="max"

          if [ "$GLOBAL_FORMAT" = "mp3 (audio only)" ]; then
            GLOBAL_TYPE="a"
            GLOBAL_VAL="$GLOBAL_AQ_NUM"
          else
            GLOBAL_TYPE="v"
            GLOBAL_VAL="$GLOBAL_VQ_NUM"
          fi

          COOKIE_ARGS=""
          [ -f youtube-cookies.txt ] && COOKIE_ARGS="--cookies youtube-cookies.txt"

          FAILED_ENTRIES='[]'
          count=$(echo "$ENTRIES_JSON" | jq length)

          for ((idx=0; idx<count; idx++)); do
            link=$(echo "$ENTRIES_JSON" | jq -r ".[$idx].link")
            args=$(echo "$ENTRIES_JSON" | jq -r ".[$idx].args[]?" 2>/dev/null || true)

            type="$GLOBAL_TYPE"
            val="$GLOBAL_VAL"
            if [ -n "$args" ]; then
              first=$(echo "$args" | head -1)
              if [ "$first" = "v" ] || [ "$first" = "a" ]; then
                type="$first"
                val=$(echo "$args" | head -2 | tail -1)
              fi
            fi

            echo "Processing: $link (type=$type quality=$val)"

            YT_DLP_ARGS="$COOKIE_ARGS --js-runtimes deno --no-progress"
            VIDEO_JSON=$(yt-dlp $YT_DLP_ARGS -j "$link" 2>/dev/null) || {
              FAILED_ENTRIES=$(echo "$FAILED_ENTRIES" | jq ". + [{link: \"$link\", type: \"$type\", val: \"$val\"}]")
              continue
            }

            # Save metadata using jq (safe, no heredoc)
            if [ "$INCLUDE_METADATA" = "true" ]; then
              TITLE=$(echo "$VIDEO_JSON" | jq -r '.title // "Unknown"')
              SAFE_TITLE=$(echo "$TITLE" | sed 's/[^a-zA-Z0-9._-]/_/g' | cut -c1-100)
              METADATA_FILE="${OUTPUT_FOLDER}/${SAFE_TITLE}_metadata.json"
              
              echo "$VIDEO_JSON" | jq '{ 
                video_id: .id,
                title: .title,
                description: .description,
                channel_name: (.channel // .uploader),
                channel_url: (.channel_url // .uploader_url),
                tags: .tags,
                duration_seconds: .duration,
                view_count: .view_count,
                like_count: .like_count,
                publish_date: .upload_date,
                download_url: "'"$link"'",
                download_date: "'"$(date -Iseconds)"'",
                quality: "'"$val"'",
                type: "'"$type"'"
              }' > "$METADATA_FILE"
              echo "Saved metadata: $METADATA_FILE"
            fi

            # Download thumbnail
            if [ "$INCLUDE_THUMBNAIL" = "true" ]; then
              THUMBNAIL_URL=$(echo "$VIDEO_JSON" | jq -r '.thumbnail // .thumbnails[-1].url // ""')
              if [ -n "$THUMBNAIL_URL" ] && [ "$THUMBNAIL_URL" != "null" ]; then
                TITLE=$(echo "$VIDEO_JSON" | jq -r '.title // "Unknown"')
                SAFE_TITLE=$(echo "$TITLE" | sed 's/[^a-zA-Z0-9._-]/_/g' | cut -c1-100)
                THUMBNAIL_FILE="${OUTPUT_FOLDER}/${SAFE_TITLE}_thumbnail.jpg"
                curl -L --fail -o "$THUMBNAIL_FILE" "$THUMBNAIL_URL" && echo "Thumbnail saved"
              fi
            fi

            # Download media
            if [ "$type" = "a" ]; then
              yt-dlp $YT_DLP_ARGS -f "bestaudio" \
                -o "$OUTPUT_FOLDER/%(title)s-${val}kbps.%(ext)s" \
                --extract-audio --audio-format mp3 --audio-quality "${val}k" "$link" || \
                FAILED_ENTRIES=$(echo "$FAILED_ENTRIES" | jq ". + [{link: \"$link\", type: \"$type\", val: \"$val\"}]")
            else
              yt-dlp $YT_DLP_ARGS -f "bestvideo[height<=${val}]+bestaudio/best[height<=${val}]" \
                -o "$OUTPUT_FOLDER/%(title)s-${val}p.%(ext)s" "$link" || \
                FAILED_ENTRIES=$(echo "$FAILED_ENTRIES" | jq ". + [{link: \"$link\", type: \"$type\", val: \"$val\"}]")
            fi
          done

          echo "FAILED_ENTRIES_JSON=$(echo "$FAILED_ENTRIES" | jq -c .)" >> $GITHUB_OUTPUT

      - name: '📂 Move files to youtube folder'
        run: |
          TEMP_DIR="${{ steps.tempdir.outputs.TEMP_DIR }}"
          FINAL_DIR="youtube"
          mkdir -p "$FINAL_DIR"
          mv "$TEMP_DIR"/* "$FINAL_DIR"/ 2>/dev/null || true
          ls -lah "$FINAL_DIR"

      - name: '📦 Create archives'
        run: |
          OUTPUT_FOLDER="youtube"
          if [ "${{ github.event.inputs.bundle_all }}" = "true" ]; then
            cd "$OUTPUT_FOLDER"
            zip -r "../youtube_bundle.zip" ./*
            cd ..
            rm -rf "$OUTPUT_FOLDER"
            mkdir -p "$OUTPUT_FOLDER"
            mv youtube_bundle.zip "$OUTPUT_FOLDER/"
          else
            for f in "$OUTPUT_FOLDER"/*; do
              [ -f "$f" ] && zip -j "${f}.zip" "$f" && rm "$f"
            done
          fi

      - name: '📤 Commit and push'
        if: ${{ github.event.inputs.upload_as_release == 'false' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add youtube/
          git diff --cached --quiet || git commit -m "⬇️ YouTube download [skip ci]"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin ${{ github.ref_name }}

      - name: '🚀 Create release'
        if: ${{ github.event.inputs.upload_as_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="youtube-dl-$(date +%Y%m%d-%H%M%S)"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" youtube/* --title "YouTube Download $TAG" --notes "Auto-generated release"

      - name: '🧹 Cleanup'
        if: always()
        run: |
          rm -rf "${{ steps.tempdir.outputs.TEMP_DIR }}" 2>/dev/null || true
          rm -f youtube-cookies.txt 2>/dev/null || true
